<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP 原型入口</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fb; color: #1f2937; }
  .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .card { width: min(760px, 100%); background: #fff; border: 1px solid #dbe2ee; border-radius: 8px; overflow: hidden; }
  .head { padding: 18px 20px; border-bottom: 1px solid #dbe2ee; }
  h1 { margin: 0; font-size: 18px; }
  p { margin: 6px 0 0; color: #5b6472; font-size: 13px; line-height: 1.6; }
  .body { padding: 20px; }
  .btn { display: inline-flex; min-height: 40px; align-items: center; justify-content: center; padding: 0 14px; border-radius: 6px; border: 1px solid #dbe2ee; text-decoration: none; color: #1f2937; background: #fff; }
  .btn.primary { margin-top: 16px; background: #2563eb; border-color: #2563eb; color: #fff; }
</style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="head">
        <h1>ERP 原型入口</h1>
        <p>当前目录下还没有可直接打开的 HTML 原型文件。</p>
      </div>
      <div class="body">
        <p>后续新增原型时，把对应的 `index.html` 放进这个目录或子目录即可。</p>
        <a class="btn primary" href="../" target="_top">返回首页</a>
      </div>
    </section>
  </div>
</body>
</html>
