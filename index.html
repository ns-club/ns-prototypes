<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ns-prototypes</title>
<style>
  :root {
    --bg: #f5f7fb;
    --panel: #fff;
    --line: #dbe2ee;
    --text: #1f2937;
    --muted: #5b6472;
    --brand: #2563eb;
    --brand-soft: #eaf1ff;
    --ok: #0f766e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  a { color: inherit; }
  .page {
    min-height: 100%;
    display: grid;
    grid-template-rows: auto 1fr;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
  }
  h1 {
    margin: 0;
    font-size: 20px;
  }
  .subtitle {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 0 14px;
    border-radius: 6px;
    border: 1px solid var(--line);
    text-decoration: none;
    background: #fff;
    white-space: nowrap;
    font-size: 14px;
  }
  .btn.primary {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }
  .btn.secondary {
    background: var(--brand-soft);
    border-color: transparent;
    color: var(--brand);
  }
  .content {
    display: grid;
    grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
    gap: 16px;
    padding: 16px;
    min-height: 0;
  }
  .panel {
    min-width: 0;
    min-height: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .nav {
    display: flex;
    flex-direction: column;
  }
  .nav-header {
    padding: 16px;
    border-bottom: 1px solid var(--line);
  }
  .nav-header h2 {
    margin: 0;
    font-size: 15px;
  }
  .nav-header p {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .nav-list {
    padding: 10px;
    overflow: auto;
  }
  .nav-item {
    display: block;
    padding: 12px 12px;
    border-radius: 6px;
    text-decoration: none;
    border: 1px solid transparent;
  }
  .nav-item:hover {
    background: #f8fafc;
    border-color: var(--line);
  }
  .nav-item.active {
    background: var(--brand-soft);
    border-color: rgba(37,99,235,.18);
  }
  .nav-item strong {
    display: block;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .nav-item span {
    display: block;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
    word-break: break-word;
  }
  .preview {
    display: grid;
    grid-template-rows: auto 1fr;
  }
  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
  }
  .preview-header strong {
    font-size: 14px;
  }
  .preview-header span {
    color: var(--muted);
    font-size: 12px;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
  }
  @media (max-width: 920px) {
    .content {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>ns-prototypes</h1>
        <p class="subtitle">静态 HTML 原型索引。左侧目录切换，右侧直接预览页面效果。</p>
      </div>
      <div class="actions">
        <a class="btn secondary" href="README.md" target="_blank" rel="noreferrer">仓库说明</a>
        <a class="btn primary" href="oms/order-to-invoice-dialog-v1/" target="preview">打开示例原型</a>
      </div>
    </header>

    <main class="content">
      <section class="panel nav">
        <div class="nav-header">
          <h2>业务域入口</h2>
          <p>每个一级目录都有自己的入口页。当前仅 OMS 下有可演示的原型，其余目录先保留目录级入口。</p>
        </div>
        <nav class="nav-list" aria-label="业务域入口">
          <a class="nav-item active" href="oms/" target="preview">
            <strong>OMS</strong>
            <span>订单转发票信息提示原型。点击进入目录页，再打开具体页面。</span>
          </a>
          <a class="nav-item" href="wms/" target="preview">
            <strong>WMS</strong>
            <span>仓库管理原型目录入口。</span>
          </a>
          <a class="nav-item" href="erp/" target="preview">
            <strong>ERP</strong>
            <span>ERP 与后台原型目录入口。</span>
          </a>
          <a class="nav-item" href="tms/" target="preview">
            <strong>TMS</strong>
            <span>物流与运输管理原型目录入口。</span>
          </a>
          <a class="nav-item" href="shared/" target="preview">
            <strong>Shared</strong>
            <span>跨系统公共原型目录入口。</span>
          </a>
        </nav>
      </section>

      <section class="panel preview">
        <div class="preview-header">
          <strong>在线预览</strong>
          <span>右侧随左侧入口切换</span>
        </div>
        <iframe name="preview" src="oms/" title="原型预览"></iframe>
      </section>
    </main>
  </div>
</body>
</html>
