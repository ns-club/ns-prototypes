<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ns-prototypes 预览</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f7fb;
    --panel: #ffffff;
    --line: #dbe2ee;
    --text: #1f2937;
    --muted: #5b6472;
    --brand: #2563eb;
    --brand-soft: #eaf1ff;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .shell {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100%;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
  }
  .title {
    min-width: 0;
  }
  .title h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
  }
  .title p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid var(--line);
    color: var(--text);
    background: #fff;
    text-decoration: none;
    font-size: 14px;
    white-space: nowrap;
  }
  .btn.primary {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }
  .btn.secondary {
    background: var(--brand-soft);
    border-color: transparent;
    color: var(--brand);
  }
  .content {
    display: grid;
    grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
    gap: 16px;
    padding: 16px;
    min-height: 0;
  }
  .sidebar, .preview {
    min-height: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .sidebar {
    display: flex;
    flex-direction: column;
  }
  .sidebar header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--line);
  }
  .sidebar h2 {
    margin: 0;
    font-size: 15px;
  }
  .sidebar p {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .nav {
    padding: 10px;
    overflow: auto;
  }
  .nav a {
    display: block;
    padding: 12px 12px;
    border-radius: 6px;
    text-decoration: none;
    color: var(--text);
    border: 1px solid transparent;
  }
  .nav a:hover {
    background: #f8fafc;
    border-color: var(--line);
  }
  .nav .current {
    background: var(--brand-soft);
    border-color: rgba(37,99,235,.18);
  }
  .nav .path {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
    word-break: break-all;
  }
  .preview {
    display: grid;
    grid-template-rows: auto 1fr;
    min-width: 0;
  }
  .preview-head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
  }
  .preview-head strong {
    font-size: 14px;
  }
  .preview-head span {
    color: var(--muted);
    font-size: 12px;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
  }
  @media (max-width: 920px) {
    .content {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="title">
      <h1>ns-prototypes</h1>
      <p>GitHub Pages 入口页，默认展示 OMS 原型效果。</p>
    </div>
    <div class="actions">
      <a class="btn secondary" href="oms/order-to-invoice-dialog-v1/" target="_blank" rel="noreferrer">新窗口打开原型</a>
      <a class="btn primary" href="https://github.com/ns-club/ns-prototypes" target="_blank" rel="noreferrer">查看仓库</a>
    </div>
  </div>

  <div class="content">
    <aside class="sidebar">
      <header>
        <h2>原型目录</h2>
        <p>每个目录都可以直接作为静态页面发布。当前默认预览 OMS 目录下的示例原型。</p>
      </header>
      <nav class="nav" aria-label="原型目录">
        <a class="current" href="oms/order-to-invoice-dialog-v1/" target="preview">
          OMS / order-to-invoice-dialog-v1
          <span class="path">oms/order-to-invoice-dialog-v1/index.html</span>
        </a>
        <div style="padding:12px 12px 0;color:var(--muted);font-size:12px;line-height:1.6;">
          其他目录当前只作为原型素材仓库使用，没有单独的在线入口。
        </div>
      </nav>
    </aside>

    <section class="preview" aria-label="原型预览">
      <div class="preview-head">
        <strong>在线预览</strong>
        <span>打开左侧目录即可切换</span>
      </div>
      <iframe name="preview" src="oms/order-to-invoice-dialog-v1/" title="原型预览"></iframe>
    </section>
  </div>
</div>
</body>
</html>
